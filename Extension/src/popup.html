<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Mac Download Manager</h1>

    <div class="status" id="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Checking...</span>
    </div>

    <div class="field">
      <label class="toggle">
        <input type="checkbox" id="enabled">
        <span class="toggle-slider"></span>
        <span class="toggle-label">Enable interception</span>
      </label>
    </div>

    <div class="field">
      <label for="fileTypes">File types</label>
      <textarea id="fileTypes" rows="3" placeholder="zip, dmg, iso, pkg..."></textarea>
    </div>

    <div class="field">
      <label for="minSize">Min file size: <strong id="minSizeValue">5</strong> MB</label>
      <input type="range" id="minSize" min="1" max="100" value="5">
    </div>

    <button id="save">Save</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
