name: MacDownloadManager
options:
  bundleIdPrefix: com.macdownloadmanager
  deploymentTarget:
    macOS: "14.0"
  minimumXcodeGenVersion: "2.40.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.4.1"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.0"

targets:
  MacDownloadManager:
    type: application
    platform: macOS
    sources:
      - path: MacDownloadManager
    resources:
      - path: MacDownloadManager/Resources/Assets.xcassets
    dependencies:
      - package: GRDB
      - package: Sparkle
      - target: NativeMessagingHelper
        embed: false
      - target: SafariExtension
        embed: true
        codeSign: false
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: MacDownloadManager/MacDownloadManager.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.macdownloadmanager.app
        PRODUCT_NAME: Mac Download Manager
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_KEY_CFBundleDisplayName: Mac Download Manager
        INFOPLIST_KEY_LSUIElement: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: MacDownloadManager/Info.plist
        CODE_SIGN_IDENTITY: "-"
    postCompileScripts:
      - script: |
          cp "${BUILT_PRODUCTS_DIR}/NativeMessagingHelper" "${BUILT_PRODUCTS_DIR}/Mac Download Manager.app/Contents/MacOS/"
        name: Copy Native Messaging Helper
        basedOnDependencyAnalysis: false
      - script: |
          "${PROJECT_DIR}/scripts/build-aria2.sh"
          DEST="${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/aria2c"
          cp "${PROJECT_DIR}/scripts/.cache/aria2c" "$DEST"
          chmod +x "$DEST"
          codesign --force --sign - "$DEST"
        name: Bundle aria2c
        basedOnDependencyAnalysis: false

  NativeMessagingHelper:
    type: tool
    platform: macOS
    sources:
      - path: NativeMessagingHelper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macdownloadmanager.helper
        PRODUCT_NAME: NativeMessagingHelper
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_IDENTITY: "-"

  SafariExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: Extensions/Safari
        excludes:
          - Resources/**
    resources:
      - path: Extensions/Safari/Resources
    dependencies:
      - sdk: SafariServices.framework
    info:
      path: Extensions/Safari/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.Safari.web-extension
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).SafariWebExtensionHandler"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macdownloadmanager.app.safari-extension
        PRODUCT_NAME: Safari Extension
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_ENTITLEMENTS: Extensions/Safari/SafariExtension.entitlements
        CODE_SIGN_IDENTITY: "-"
        GENERATE_INFOPLIST_FILE: false

  MacDownloadManagerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: MacDownloadManager
      - package: GRDB
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Mac Download Manager.app/Contents/MacOS/Mac Download Manager"
        BUNDLE_LOADER: "$(TEST_HOST)"
